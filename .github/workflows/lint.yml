name: Lint and Format Check

on:
  pull_request:
    branches: [main] # Trigger only on PRs targeting main

jobs:
  lint:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm" # Speeds up subsequent runs

      - name: Install dependencies
        run: npm ci

      - name: Check Formatting with Prettier
        run: npx prettier --list-different . | xargs -I{} sh -c 'echo "=== {} ===" && npx prettier {} | diff {} -'

      - name: Run Linter (ESLint)
        run: npm run lint

      - name: Lint Dockerfiles
        continue-on-error: true # currently we don't have a Dockerfile for frontend
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: "**/Dockerfile*"
          recursive: true

name: Lint and Format Check

on:
  pull_request:
    branches: [ main ] # Trigger only on PRs targeting main

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:
    inputs:
      # Skip three formatting/linting related steps
      skip_linting:
        description: 'Skip Java and Dockerfile linting? (true/false)'
        default: 'false'
        required: false

jobs:
  lint:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm' # Speeds up subsequent runs

      - name: Install dependencies
        run: npm ci

      - name: Check Formatting (Prettier)
        run: npx prettier --check .

      - name: Run Linter (ESLint)
        run: npm run lint

      - name: Lint Dockerfiles
        if: github.event.inputs.skip_linting != 'true'
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: "**/Dockerfile*"
          recursive: true